name: Test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: read
jobs:
  test:
    name: Test
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Install Jujutsu for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -fsSLO https://github.com/jj-vcs/jj/releases/download/v0.39.0/jj-v0.39.0-x86_64-unknown-linux-musl.tar.gz
          echo '8da8d96e9c8696c21ad47847a63d533e249acb0449d9af0f0562b5ea7b024f04 jj-v0.39.0-x86_64-unknown-linux-musl.tar.gz' | sha256sum --check -
          mkdir -- "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          tar -C "$RUNNER_TEMP/bin" -xzf "$(pwd)/jj-v0.39.0-x86_64-unknown-linux-musl.tar.gz"
      - name: Install Jujutsu for macOS
        if: matrix.os == 'macos-latest'
        run: |
          curl -fsSLO https://github.com/jj-vcs/jj/releases/download/v0.39.0/jj-v0.39.0-aarch64-apple-darwin.tar.gz
          echo '525ee96fd1eda1be925b3827a964c58a9f14bc2bae411bd7d8422fe1af40ea19 jj-v0.39.0-aarch64-apple-darwin.tar.gz' | sha256sum --check -
          mkdir -- "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          tar -C "$RUNNER_TEMP/bin" -xzf "$(pwd)/jj-v0.39.0-aarch64-apple-darwin.tar.gz"
      - name: Install Scoop
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          "${env:UserProfile}\scoop\shims" | Out-File ${env:GITHUB_PATH} -Append
      - name: Install Jujutsu for Windows
        if: matrix.os == 'windows-latest'
        run: scoop install jj@0.39.0
      - name: Run tests
        run: go test -mod=readonly -race -v ./...
